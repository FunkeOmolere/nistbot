<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NISTBot — NIST 800-53 Compliance Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #13110e;
      --surface: #1c1813;
      --surface2: #231e17;
      --border: #2e2720;
      --accent: #d4922a;
      --accent-light: #e8b05a;
      --accent-dim: rgba(212, 146, 42, 0.08);
      --accent-glow: rgba(212, 146, 42, 0.2);
      --text: #f0e8dc;
      --text-dim: #8a7a65;
      --text-muted: #3d3228;
      --bot-bubble: #1a1610;
      --user-bubble: #2a1f0e;
      --green: #7fb98a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(212,146,42,0.07), transparent);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .logo { display: flex; align-items: center; gap: 14px; }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--accent-dim);
      border: 1px solid rgba(212,146,42,0.35);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
    }

    .logo-title {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
    }

    .logo-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 0.04em; margin-top: 1px; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    .tag {
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-dim);
      border: 1px solid rgba(212,146,42,0.2);
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      font-family: 'Syne', sans-serif;
      font-weight: 500;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-dim);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 6px 12px;
      border-radius: 20px;
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2.5s infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    .chat-wrapper { flex: 1; overflow: hidden; display: flex; flex-direction: column; position: relative; z-index: 1; }

    #chat {
      flex: 1; overflow-y: auto;
      padding: 28px 24px;
      display: flex; flex-direction: column; gap: 22px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message { display: flex; gap: 13px; max-width: 800px; animation: fadeUp 0.25s ease; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { align-self: flex-end; flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
      font-family: 'Syne', sans-serif; letter-spacing: 0.03em;
    }

    .bot .avatar { background: var(--accent-dim); border: 1px solid rgba(212,146,42,0.3); color: var(--accent); }
    .user .avatar { background: rgba(212,146,42,0.12); border: 1px solid rgba(212,146,42,0.25); color: var(--accent-light); }

    .bubble { padding: 14px 18px; border-radius: 12px; font-size: 14px; line-height: 1.75; max-width: 660px; }
    .bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-top-left-radius: 3px; color: var(--text); }
    .user .bubble { background: var(--user-bubble); border: 1px solid rgba(212,146,42,0.2); border-top-right-radius: 3px; color: var(--text); }

    .typing { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; opacity: 0.5; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-6px); opacity: 1; } }

    .welcome { margin: auto; text-align: center; max-width: 480px; padding: 40px 20px; }

    .welcome-icon {
      width: 60px; height: 60px;
      background: var(--accent-dim);
      border: 1px solid rgba(212,146,42,0.3);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 26px;
    }

    .welcome h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 10px; color: var(--text); }
    .welcome p { font-size: 14px; color: var(--text-dim); line-height: 1.65; margin-bottom: 28px; }

    .suggestions { display: flex; flex-direction: column; gap: 8px; }

    .suggestion-btn {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
      padding: 11px 16px; border-radius: 9px; font-size: 13px;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      text-align: left; transition: all 0.2s;
      display: flex; align-items: center; gap: 10px;
    }

    .suggestion-btn:hover { border-color: rgba(212,146,42,0.4); color: var(--text); background: var(--accent-dim); }
    .suggestion-btn .arr { margin-left: auto; color: var(--text-muted); }

    .input-area {
      position: relative; z-index: 10;
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 16px 24px; flex-shrink: 0;
    }

    .input-row { display: flex; gap: 10px; align-items: flex-end; max-width: 800px; margin: 0 auto; }

    textarea {
      flex: 1; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      padding: 13px 16px; resize: none; outline: none;
      min-height: 48px; max-height: 140px; line-height: 1.5;
      transition: border-color 0.2s;
    }

    textarea::placeholder { color: var(--text-muted); }
    textarea:focus { border-color: rgba(212,146,42,0.4); }

    #send-btn {
      width: 48px; height: 48px; background: var(--accent);
      border: none; border-radius: 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s;
    }

    #send-btn:hover { background: var(--accent-light); transform: translateY(-1px); }
    #send-btn:active { transform: translateY(0); }
    #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
    #send-btn svg { width: 18px; height: 18px; fill: #13110e; }

    .input-hint { text-align: center; margin-top: 10px; font-size: 11px; color: var(--text-muted); letter-spacing: 0.03em; }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      .tag { display: none; }
      #chat { padding: 16px; }
      .input-area { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">NB</div>
    <div>
      <div class="logo-title">NISTBot</div>
      <div class="logo-sub">800-53 Rev 5 Assistant</div>
    </div>
  </div>
  <div class="header-right">
    <span class="tag">NIST SP 800-53 Rev 5</span>
    <div class="status-badge">
      <div class="status-dot"></div>
      Live
    </div>
  </div>
</header>

<div class="chat-wrapper">
  <div id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🛡️</div>
      <h2>NIST 800-53 Compliance Assistant</h2>
      <p>Ask me anything about NIST SP 800-53 Rev 5 security and privacy controls. I'll find the most relevant guidance and explain it clearly.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          What are the access control requirements under AC-2?
          <span class="arr">→</span>
        </button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          What does NIST say about incident response planning?
          <span class="arr">→</span>
        </button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          Which controls apply to multi-factor authentication?
          <span class="arr">→</span>
        </button>
        <button class="suggestion-btn" onclick="sendSuggestion(this)">
          Explain the audit and accountability control family.
          <span class="arr">→</span>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea
      id="input"
      placeholder="Ask about NIST 800-53 controls, families, implementation guidance…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="input-hint">Powered by RAG · NIST SP 800-53 Rev 5 · N8N + Pinecone + Claude</div>
</div>

<script>
  const WEBHOOK_URL = "https://cybershift.app.n8n.cloud/webhook/da347d32-7b8c-4042-baa8-6d66b1cafb7b/chat";
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");
  let sessionId = "session-" + Date.now();
  let isLoading = false;

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 140) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function sendSuggestion(btn) {
    input.value = btn.innerText.replace("→", "").trim();
    sendMessage();
  }

  function hideWelcome() {
    const w = document.getElementById("welcome");
    if (w) w.remove();
  }

  function appendMessage(role, text) {
    hideWelcome();
    const msg = document.createElement("div");
    msg.className = `message ${role}`;
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "bot" ? "NB" : "YOU";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    hideWelcome();
    const msg = document.createElement("div");
    msg.className = "message bot";
    msg.id = "typing-indicator";
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "NB";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById("typing-indicator");
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;
    isLoading = true;
    sendBtn.disabled = true;
    input.value = "";
    input.style.height = "auto";
    appendMessage("user", text);
    showTyping();
    try {
      const res = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chatInput: text, sessionId })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      removeTyping();
      const reply =
        data?.output || data?.text || data?.message || data?.response ||
        (Array.isArray(data) && data[0]?.output) ||
        (Array.isArray(data) && data[0]?.text) ||
        "I received your question but couldn't parse the response. Please try again.";
      appendMessage("bot", reply);
    } catch (err) {
      removeTyping();
      appendMessage("bot", "⚠️ Couldn't reach NISTBot. Please check your workflow is active and try again.");
      console.error(err);
    }
    isLoading = false;
    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
